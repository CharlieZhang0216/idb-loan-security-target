server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # VULN-20: Index listing enabled on static directory
    location /static/ {
        alias /usr/share/nginx/html/static/;
        autoindex on;           # VULN-20: Directory listing
        autoindex_exact_size off;
        autoindex_localtime on;
    }

    # VULN-20: Nginx config exposure
    location /nginx_status {
        stub_status on;         # VULN-20: Nginx status page exposed
        allow all;
    }

    # API proxy
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # GraphQL proxy
    location /graphql {
        proxy_pass http://backend:5000/graphql;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers (incomplete — relaxed for testing)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    # VULN-20: Missing CSP, Missing HSTS, Missing X-XSS-Protection
}
